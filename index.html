<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMPAN XMD | Pair Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --accent: #00f2ff; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle at center, #1e293b, #0f172a); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; color: white; overflow: hidden; }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; padding: 2.5rem; border-radius: 2.5rem; text-align: center; }
        .jampan-logo { font-weight: 800; font-size: 1.6rem; background: linear-gradient(to right, #3b82f6, #00f2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loader { border-top-color: #00f2ff; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="glass-card mx-4 shadow-2xl">
        <div class="mb-8">
            <div class="w-16 h-16 bg-blue-600/20 rounded-2xl flex items-center justify-center mx-auto mb-3 border border-blue-500/30">
                <span class="text-2xl font-black italic text-blue-400">JX</span>
            </div>
            <div class="jampan-logo">JAMPAN XMD</div>
            <p class="text-[10px] text-gray-400 uppercase tracking-[3px] mt-1">Connection Engine</p>
        </div>

        <div id="input-section">
            <div class="text-left mb-6">
                <label class="text-[10px] font-bold text-blue-400 ml-1 mb-2 block uppercase">Phone Number</label>
                <input type="number" id="phone-number" placeholder="255674229015" 
                    class="w-full py-4 px-6 rounded-2xl bg-black/20 border border-white/10 text-white text-lg focus:border-cyan-400 outline-none transition-all">
            </div>
            <button onclick="getPairingCode()" class="w-full py-4 rounded-2xl font-bold text-white bg-gradient-to-r from-blue-600 to-blue-500 hover:shadow-lg hover:shadow-blue-500/30 transition-all">
                GET PAIRING CODE
            </button>
        </div>

        <div id="loading-section" class="hidden py-8 text-center">
            <div class="loader w-12 h-12 border-4 border-white/10 rounded-full mx-auto mb-4"></div>
            <p class="text-sm text-cyan-400 animate-pulse">Inatengeneza code yako...</p>
        </div>

        <div id="result-section" class="hidden">
            <p class="text-xs text-gray-400 mb-4 uppercase tracking-widest">Your Code:</p>
            <div class="bg-black/40 border border-cyan-400/50 py-5 rounded-2xl mb-6 shadow-[0_0_15px_rgba(0,242,255,0.1)]">
                <span id="display-code" class="text-3xl font-bold text-white font-mono tracking-[6px]">--------</span>
            </div>
            <p class="text-[10px] text-blue-300 italic mb-6">Fungua WhatsApp > Linked Devices > Link with Phone Number</p>
            <button onclick="location.reload()" class="text-[10px] text-gray-500 hover:text-white uppercase font-bold">Tumia Namba Nyingine</button>
        </div>

        <div class="mt-8 pt-6 border-t border-white/5">
            <p class="text-[9px] text-gray-600">JAMPAN TECH © 2026</p>
        </div>
    </div>

    <script>
        // Hapa ndipo fix ilipo - Inachukua link ya server yenyewe!
        const API_BASE = window.location.origin;

        async function getPairingCode() {
            const phone = document.getElementById('phone-number').value;
            if (!phone) return alert("Weka namba!");

            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('loading-section').classList.remove('hidden');

            try {
                const response = await fetch(`${API_BASE}/code?number=${phone}`);
                const data = await response.json();
                
                if (data.code) {
                    document.getElementById('loading-section').classList.add('hidden');
                    document.getElementById('result-section').classList.remove('hidden');
                    document.getElementById('display-code').innerText = data.code;
                } else {
                    throw new Error("No code");
                }
            } catch (error) {
                alert("Server Connection Error!");
                location.reload();
            }
        }
    </script>
</body>
</html>
