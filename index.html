<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMPAN XMD | Server 1</title>
    <meta property="og:image" content="https://files.catbox.moe/a380aw.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 3rem;
            padding: 3rem 2rem;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }
        .server-tag {
            background: rgba(0, 242, 255, 0.1);
            color: #00f2ff;
            padding: 6px 24px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 1px solid rgba(0, 242, 255, 0.2);
            display: inline-block;
        }
        input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus {
            border-color: #00f2ff;
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.15);
        }
        .btn-main {
            background: linear-gradient(135deg, #00f2ff 0%, #0072ff 100%);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.3);
            transition: all 0.3s ease;
        }
        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0, 242, 255, 0.5);
        }
        #pair-code {
            font-family: 'Monaco', 'Consolas', monospace;
            letter-spacing: 6px;
            color: #00f2ff;
            cursor: pointer;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }
        .instruction-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        .instruction-step {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
            text-align: left;
        }
        .step-num {
            background: #00f2ff;
            color: #0f172a;
            width: 22px;
            height: 22px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 11px;
            flex-shrink: 0;
        }
        .btn-new-session {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            transition: all 0.3s;
        }
        .btn-new-session:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border-color: white;
        }
    </style>
</head>
<body>

    <div class="glass">
        <div class="mb-8">
            <span class="server-tag">Server 01</span>
        </div>
        
        <h1 class="text-4xl font-black italic tracking-tighter uppercase mb-2">JAMPAN <span class="text-cyan-400">XMD</span></h1>
        <p class="text-[10px] text-gray-500 uppercase tracking-[8px] mb-12 font-bold italic">Terminal Service</p>

        <!-- INPUT AREA -->
        <div id="input-area">
            <div class="relative mb-6">
                <i class="fa-solid fa-phone absolute left-6 top-6 text-gray-500"></i>
                <input type="number" id="number" placeholder="255674229015" class="w-full pl-16 pr-6 py-5 rounded-2xl text-xl font-bold">
            </div>
            <button onclick="getCode()" id="submit-btn" class="w-full py-5 rounded-2xl btn-main font-black uppercase tracking-widest text-sm">
                Get Pairing Code
            </button>
        </div>

        <!-- RESULT AREA -->
        <div id="result-area" class="hidden">
            <div class="bg-slate-900/60 p-8 rounded-[2.5rem] border-2 border-dashed border-cyan-500/20 mb-4 transition-all hover:border-cyan-500/50">
                <p class="text-[9px] text-cyan-400 uppercase font-black tracking-widest mb-4">Tap Code to Copy</p>
                <div id="pair-code" onclick="copyCode()" class="text-4xl font-black">--------</div>
            </div>
            
            <!-- INSTRUCTIONS BOX -->
            <div class="instruction-card">
                <div class="instruction-step">
                    <div class="step-num">1</div>
                    <p class="text-[11px] text-gray-400">Open <span class="text-white font-bold">WhatsApp</span></p>
                </div>
                <div class="instruction-step">
                    <div class="step-num">2</div>
                    <p class="text-[11px] text-gray-400">Go to <span class="text-white font-bold">Settings > Linked Devices</span></p>
                </div>
                <div class="instruction-step">
                    <div class="step-num">3</div>
                    <p class="text-[11px] text-gray-400">Tap <span class="text-white font-bold">Link a Device > Use number instead</span></p>
                </div>
                <div class="instruction-step">
                    <div class="step-num">4</div>
                    <p class="text-[11px] text-gray-400">Enter the code shown above</p>
                </div>
            </div>

            <!-- NEW SESSION BUTTON - CHINI KABISA -->
            <button onclick="location.reload()" class="w-full mt-8 py-4 rounded-2xl btn-new-session text-[10px] font-black uppercase tracking-[3px]">
                <i class="fa-solid fa-plus-circle mr-2"></i> Pair New Session
            </button>
        </div>

        <!-- LOADING -->
        <div id="loading" class="hidden flex flex-col items-center mt-8">
            <div class="w-10 h-10 border-4 border-cyan-400/10 border-t-cyan-400 rounded-full animate-spin mb-4"></div>
            <p class="text-cyan-400 animate-pulse text-[10px] uppercase font-black tracking-widest">Generating Code...</p>
        </div>

        <p class="mt-12 text-[7px] text-gray-800 font-bold uppercase tracking-[15px]">JAMPAN-TECH</p>
    </div>

    <script>
        async function getCode() {
            const num = document.getElementById('number').value;
            if (!num) return alert("Ingiza namba mwanangu!");

            document.getElementById('input-area').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            try {
                const response = await fetch(`/code?number=${num}`);
                const data = await response.json();

                if (data.code) {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('result-area').classList.remove('hidden');
                    document.getElementById('pair-code').innerText = data.code;
                } else {
                    alert(data.error || "Imefeli! Jaribu tena.");
                    location.reload();
                }
            } catch (err) {
                alert("Server Connection Lost!");
                location.reload();
            }
        }

        function copyCode() {
            const code = document.getElementById('pair-code').innerText;
            if(code === "--------") return;
            
            navigator.clipboard.writeText(code);
            const el = document.getElementById('pair-code');
            const old = el.innerText;
            
            el.innerText = "COPIED!";
            el.style.color = "#22c55e";
            
            setTimeout(() => {
                el.innerText = old;
                el.style.color = "#00f2ff";
            }, 1000);
        }
    </script>
</body>
</html>
