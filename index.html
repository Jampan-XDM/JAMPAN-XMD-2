<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMPAN XMD | Connection Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #00f2ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1e293b, #0f172a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: white;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 2.5rem;
            text-align: center;
            position: relative;
        }

        .jampan-logo {
            font-weight: 800;
            font-size: 1.6rem;
            background: linear-gradient(to right, #3b82f6, #00f2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .input-field {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            outline: none;
        }

        .btn-glow {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }

        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
        }

        .code-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed var(--accent);
            letter-spacing: 6px;
        }

        .loader {
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Background Accents -->
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 blur-[100px] rounded-full"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-cyan-600/10 blur-[100px] rounded-full"></div>

    <div class="glass-card mx-4">
        <!-- Logo -->
        <div class="mb-8">
            <div class="w-16 h-16 bg-blue-600/20 rounded-2xl flex items-center justify-center mx-auto mb-3 border border-blue-500/30">
                <span class="text-2xl font-black italic text-blue-400">JX</span>
            </div>
            <div class="jampan-logo tracking-tight">JAMPAN XMD</div>
            <p class="text-[10px] text-gray-400 uppercase tracking-[3px] mt-1">Multi-Device Link</p>
        </div>

        <!-- Input Section -->
        <div id="input-section">
            <div class="text-left mb-6">
                <label class="text-[10px] font-bold text-blue-400 ml-1 mb-2 block uppercase">Phone Number</label>
                <input type="number" id="phone-number" placeholder="255XXXXXXXXX" 
                    class="input-field w-full py-4 px-6 rounded-2xl text-white text-lg font-semibold tracking-wider">
            </div>
            <button onclick="getPairingCode()" class="btn-glow w-full py-4 rounded-2xl font-bold text-white shadow-lg">
                GET PAIRING CODE
            </button>
        </div>

        <!-- Loading State -->
        <div id="loading-section" class="hidden py-8">
            <div class="loader w-12 h-12 border-4 border-white/10 rounded-full mx-auto mb-4"></div>
            <p class="text-sm text-cyan-400 animate-pulse">Inatengeneza code yako...</p>
        </div>

        <!-- Result Section -->
        <div id="result-section" class="hidden">
            <p class="text-xs text-gray-400 mb-4">Weka code hii kwenye WhatsApp yako:</p>
            <div class="code-box py-5 rounded-2xl mb-6">
                <span id="display-code" class="text-3xl font-bold text-white font-mono">--------</span>
            </div>
            <div class="bg-blue-500/5 p-4 rounded-xl mb-4 border border-blue-500/10">
                <p class="text-[10px] text-blue-300 leading-relaxed italic">
                    Fungua WhatsApp > Settings > Linked Devices > Link with Phone Number.
                </p>
            </div>
            <button onclick="location.reload()" class="text-[10px] text-gray-500 hover:text-white transition-colors uppercase font-bold">
                Tumia Namba Nyingine
            </button>
        </div>

        <div class="mt-8 pt-6 border-t border-white/5">
            <p class="text-[9px] text-gray-600">POWERED BY JAMPAN TECH | © 2026</p>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://jampana-ae0ef15ed725.herokuapp.com";

        async function getPairingCode() {
            const phone = document.getElementById('phone-number').value;
            if (!phone || phone.length < 10) {
                alert("Tafadhali weka namba sahihi (mfano: 255674229015)");
                return;
            }

            // Show Loading
            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('loading-section').classList.remove('hidden');

            try {
                // Tunaita endpoint ya /code kule Heroku
                const response = await fetch(`${BACKEND_URL}/code?number=${phone}`);
                const data = await response.json();

                if (data.code) {
                    document.getElementById('loading-section').classList.add('hidden');
                    document.getElementById('result-section').classList.remove('hidden');
                    document.getElementById('display-code').innerText = data.code;
                } else {
                    throw new Error("Code not found");
                }
            } catch (error) {
                alert("Kuna hitilafu! Hakikisha Backend inafanya kazi.");
                location.reload();
            }
        }
    </script>
</body>
</html>
