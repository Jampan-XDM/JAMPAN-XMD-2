<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMPAN XMD | Server 01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #050a14;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 242, 255, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(188, 19, 254, 0.05) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            border-radius: 30px;
            padding: 2.5rem;
            width: 90%;
            max-width: 420px;
            position: relative;
        }

        .server-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            background: rgba(0, 242, 255, 0.1);
            color: var(--neon-blue);
            padding: 4px 12px;
            border-radius: 50px;
            border: 1px solid var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #00ff00;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .input-glow:focus {
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            border-color: var(--neon-blue);
        }

        .btn-neon {
            background: linear-gradient(90deg, #00f2ff, #bc13fe);
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .btn-neon:hover {
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.5);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="glass-card text-center">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <span class="server-badge">Server 01</span>
            <div class="flex items-center">
                <span class="status-dot"></span>
                <span class="text-[10px] text-gray-400 font-bold uppercase">System Online</span>
            </div>
        </div>

        <!-- Logo Section -->
        <div class="mb-10">
            <h1 class="text-3xl font-black italic tracking-tighter text-white">
                JAMPAN <span class="text-cyan-400">XMD</span>
            </h1>
            <div class="h-1 w-20 bg-gradient-to-r from-cyan-400 to-purple-500 mx-auto mt-1 rounded-full"></div>
        </div>

        <!-- Bot Status Dashboard -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-black/30 p-3 rounded-2xl border border-white/5">
                <p class="text-[9px] text-gray-500 uppercase">Latency</p>
                <p class="text-sm font-bold text-cyan-400">24ms</p>
            </div>
            <div class="bg-black/30 p-3 rounded-2xl border border-white/5">
                <p class="text-[9px] text-gray-500 uppercase">Uptime</p>
                <p class="text-sm font-bold text-purple-400">99.9%</p>
            </div>
        </div>

        <!-- Main Interaction -->
        <div id="input-area">
            <div class="relative mb-6">
                <input type="number" id="number" placeholder="255674229015" 
                    class="input-glow w-full bg-black/40 border border-white/10 py-4 px-6 rounded-2xl text-white text-center text-lg outline-none transition-all">
            </div>
            <button onclick="getPair()" class="btn-neon w-full py-4 rounded-2xl text-white shadow-lg">
                Generate Link Code
            </button>
        </div>

        <!-- Result Area -->
        <div id="result-area" class="hidden">
            <p class="text-[10px] text-gray-400 mb-2 uppercase">Copy your code below:</p>
            <div class="bg-white/5 border-2 border-dashed border-cyan-400/50 py-6 rounded-3xl mb-6">
                <span id="copy-code" class="text-4xl font-bold tracking-[8px] text-white">------</span>
            </div>
            <button onclick="location.reload()" class="text-[10px] text-gray-500 hover:text-white transition-all font-bold">RESTART PROCESS</button>
        </div>

        <!-- Footer -->
        <div class="mt-10 pt-6 border-t border-white/5">
            <p class="text-[8px] text-gray-600 tracking-[4px] uppercase">Powered by Jampan Tech Group</p>
        </div>
    </div>

    <script>
        async function getPair() {
            const num = document.getElementById('number').value;
            if(!num) return alert("Ingiza namba ya simu!");

            // Animation
            const btn = document.querySelector('button');
            btn.innerHTML = "Processing...";
            btn.disabled = true;

            try {
                const res = await fetch(`${window.location.origin}/code?number=${num}`);
                const data = await res.json();
                
                if(data.code) {
                    document.getElementById('input-area').classList.add('hidden');
                    document.getElementById('result-area').classList.remove('hidden');
                    document.getElementById('copy-code').innerText = data.code;
                }
            } catch (e) {
                alert("Server Error! Jaribu tena.");
                location.reload();
            }
        }
    </script>
</body>
</html>
